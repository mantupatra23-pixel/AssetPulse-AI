<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetPulse Pro | Digital Arbitrage Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; color: #101828; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        
        .glass-table { 
            background: white; 
            border: 1px solid #eaecf0; 
            border-radius: 16px; 
            max-height: 600px;
            overflow-y: auto;
        }

        thead th {
            position: sticky;
            top: 0;
            z-index: 20;
            background: #f9fafb;
            border-bottom: 2px solid #eaecf0;
            font-size: 11px;
            font-weight: 700;
            color: #667085;
            text-transform: uppercase;
            padding: 16px 24px;
        }

        td { padding: 16px 24px; border-bottom: 1px solid #f2f4f7; font-size: 14px; }
        tr:hover { background: #f8fafc; }
        
        .status-pill { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .status-high { background: #ecfdf3; color: #027a48; }
        
        .btn-buy { 
            background: #2563eb; 
            color: white; 
            padding: 6px 12px; 
            border-radius: 8px; 
            font-size: 10px; 
            font-weight: 800;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .btn-buy:hover { background: #000; transform: scale(1.05); }
        
        .loader { border-top-color: #2563eb; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8 no-print">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tighter">AssetPulse <span class="text-blue-600">Pro</span></h1>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Digital Asset Identification & Valuation</p>
            </div>
            <div class="text-right">
                <span class="text-[10px] font-black text-green-500 bg-green-50 px-2 py-1 rounded">● ENGINE_READY</span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 no-print">
            <div class="md:col-span-2 relative">
                <input type="text" id="assetInput" placeholder="Selected identity..." 
                    class="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold shadow-sm outline-none focus:ring-4 focus:ring-blue-50/50">
            </div>
            <button onclick="runAudit('analyze')" class="bg-blue-600 text-white font-bold rounded-2xl py-4 shadow-lg shadow-blue-100 hover:bg-blue-700 transition">VALUATION AUDIT</button>
            <button onclick="runAudit('leads')" class="bg-slate-900 text-white font-bold rounded-2xl py-4 hover:bg-black transition">BUYER STRATEGY</button>
        </div>

        <div class="glass-table custom-scroll no-print shadow-sm">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr>
                        <th>Asset Name</th>
                        <th>Classification</th>
                        <th>Discovery Status</th>
                        <th>Acquisition</th>
                    </tr>
                </thead>
                <tbody id="assetTableBody">
                    </tbody>
            </table>
        </div>

        <div id="modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-md flex items-center justify-center p-4 z-50">
            <div class="bg-white rounded-3xl shadow-2xl max-w-3xl w-full p-8 md:p-12 relative max-h-[90vh] overflow-y-auto">
                <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-slate-900">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                <h2 id="modalTitle" class="text-2xl font-black text-slate-900 uppercase tracking-tighter border-b pb-4 mb-6">Asset Intelligence</h2>
                <div id="modalContent" class="text-slate-700 leading-relaxed text-sm whitespace-pre-wrap"></div>
                <div class="mt-8 pt-6 border-t flex justify-between items-center">
                    <button onclick="window.print()" class="text-xs font-bold text-blue-600 border border-blue-100 px-4 py-2 rounded-lg hover:bg-blue-50">DOWNLOAD PDF</button>
                    <span class="text-[10px] text-slate-300 font-bold italic uppercase">AssetPulse Neural Audit v3.2</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchPool() {
            try {
                const res = await fetch('/hunted');
                const data = await res.json();
                const body = document.getElementById('assetTableBody');
                
                body.innerHTML = data.assets.map(a => `
                    <tr onclick="selectAsset('${a.name}')">
                        <td class="font-bold text-blue-600 tracking-tight">${a.name}</td>
                        <td><span class="text-[10px] font-black text-slate-400 bg-slate-100 px-2 py-1 rounded uppercase tracking-tighter">${a.type}</span></td>
                        <td><span class="status-pill status-high">${a.status}</span></td>
                        <td>
                            <a href="https://www.godaddy.com/domainsearch/find?domainToCheck=${a.name}" target="_blank" 
                               class="btn-buy inline-block" onclick="event.stopPropagation();">
                               CHECK PRICE →
                            </a>
                        </td>
                    </tr>
                `).join('');
            } catch (e) { console.error("Link offline."); }
        }

        function selectAsset(name) {
            document.getElementById('assetInput').value = name;
        }

        async function runAudit(mode) {
            const val = document.getElementById('assetInput').value;
            if(!val) return alert("Select an asset first.");

            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            const title = document.getElementById('modalTitle');

            modal.classList.remove('hidden');
            title.innerText = mode === 'analyze' ? "Valuation Audit" : "Target Buyer Strategy";
            content.innerHTML = `<div class="flex flex-col items-center py-12"><div class="loader h-8 w-8 border-4 border-slate-200 rounded-full mb-4"></div><p class="text-[10px] font-black text-slate-400 tracking-widest uppercase">Consulting AI Knowledge Base...</p></div>`;

            try {
                const res = await fetch(`/${mode}?name=${encodeURIComponent(val)}`);
                const data = await res.json();
                content.innerText = data.result || data.error;
            } catch (e) { content.innerText = "Connection failed."; }
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        
        fetchPool();
        setInterval(fetchPool, 30000);
    </script>
</body>
</html>
