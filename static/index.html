<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetPulse Pro | Brokerage Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; }
        .glass-table { background: white; border: 1px solid #eaecf0; border-radius: 16px; max-height: 550px; overflow-y: auto; }
        thead th { position: sticky; top: 0; z-index: 20; background: #f9fafb; font-size: 11px; font-weight: 700; color: #667085; text-transform: uppercase; padding: 16px 24px; }
        td { padding: 16px 24px; border-bottom: 1px solid #f2f4f7; font-size: 14px; }
        tr:hover { background: #f9fafb; cursor: pointer; }
        .btn-action { transition: 0.2s; font-weight: 700; text-transform: uppercase; font-size: 10px; padding: 12px; border-radius: 12px; }
    </style>
</head>
<body class="p-4 md:p-10 text-slate-900">
    <div class="max-w-7xl mx-auto">
        <header class="flex justify-between items-center mb-8 no-print">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tighter">AssetPulse <span class="text-blue-600">Pro</span></h1>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Autonomous Stealth Brokerage Console</p>
            </div>
            <span class="text-[10px] font-black text-green-600 bg-green-50 px-3 py-1 rounded">V3.5 BUSINESS_MODE_ACTIVE</span>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-4 mb-8 no-print">
            <input type="text" id="assetInput" placeholder="Selected Identity..." class="md:col-span-6 p-4 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-400 font-bold shadow-sm">
            <button onclick="run('analyze')" class="md:col-span-2 btn-action bg-blue-600 text-white hover:bg-blue-700 shadow-lg shadow-blue-100">Audit Value</button>
            <button onclick="run('safe_report')" class="md:col-span-2 btn-action bg-emerald-600 text-white hover:bg-emerald-700 shadow-lg shadow-emerald-100">Safe Pitch</button>
            <button onclick="run('leads')" class="md:col-span-2 btn-action bg-slate-900 text-white hover:bg-black">Get Buyers</button>
        </div>

        <div class="glass-table shadow-sm no-print">
            <table class="w-full text-left">
                <thead>
                    <tr><th>Asset Identity</th><th>Class</th><th>Market Signal</th><th>Acquire</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div id="modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-md flex items-center justify-center p-4 z-50">
            <div class="bg-white rounded-3xl shadow-2xl max-w-3xl w-full p-8 md:p-12 relative max-h-[90vh] overflow-y-auto">
                <button onclick="document.getElementById('modal').classList.add('hidden')" class="absolute top-6 right-6 text-slate-400 hover:text-slate-900">CLOSE</button>
                <h2 id="modalTitle" class="text-2xl font-black uppercase tracking-tighter border-b pb-4 mb-6 text-slate-800">Intelligence Report</h2>
                <div id="modalContent" class="text-sm leading-relaxed whitespace-pre-wrap text-slate-700"></div>
                <div class="mt-8 pt-6 border-t flex justify-between items-center">
                    <button onclick="downloadPDF()" class="text-xs font-bold text-blue-600 underline">SAVE PDF REPORT</button>
                    <span class="text-[10px] text-slate-400 font-bold uppercase italic">AssetPulse Secure Protocol</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchPool() {
            const res = await fetch('/hunted');
            const data = await res.json();
            document.getElementById('tableBody').innerHTML = data.assets.map(a => `
                <tr onclick="document.getElementById('assetInput').value='${a.name}'">
                    <td class="font-bold text-blue-600">${a.name}</td>
                    <td><span class="text-[10px] font-black text-slate-400 bg-slate-100 px-2 py-1 rounded uppercase">${a.type}</span></td>
                    <td><span class="text-xs font-bold text-emerald-600">${a.status}</span></td>
                    <td><a href="https://www.godaddy.com/domainsearch/find?domainToCheck=${a.name}" target="_blank" class="text-[10px] font-black bg-slate-900 text-white px-3 py-1 rounded uppercase" onclick="event.stopPropagation()">Price</a></td>
                </tr>
            `).join('');
        }

        async function run(mode) {
            const val = document.getElementById('assetInput').value;
            if(!val) return;
            const modal = document.getElementById('modal');
            const txt = document.getElementById('modalContent');
            modal.classList.remove('hidden');
            txt.innerText = "Consulting neural market data...";
            try {
                const res = await fetch(`/${mode}?name=${encodeURIComponent(val)}`);
                const data = await res.json();
                txt.innerText = data.result || data.error;
            } catch (e) { txt.innerText = "System error."; }
        }

        function downloadPDF() {
            const element = document.getElementById('modal');
            html2pdf().from(element).save('AssetPulse_Report.pdf');
        }

        fetchPool();
    </script>
</body>
</html>
