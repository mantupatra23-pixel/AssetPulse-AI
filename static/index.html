<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetPulse AI | Institutional Liquidity Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background: #05070a; 
            color: #e2e8f0; 
            overflow-x: hidden;
        }
        .glass { 
            background: rgba(13, 18, 30, 0.95); 
            backdrop-filter: blur(25px); 
            border: 1px solid rgba(59, 130, 246, 0.1); 
        }
        .neon-blue { 
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.6); 
        }
        .card-glow {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .card-glow:hover { 
            border-color: rgba(59, 130, 246, 0.4); 
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(59, 130, 246, 0.1);
            transform: translateY(-8px) scale(1.02); 
        }
        .roi-badge { 
            background: linear-gradient(90deg, #1e40af, #3b82f6); 
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
        }
        .btn-main {
            background: #2563eb;
            transition: all 0.3s ease;
        }
        .btn-main:hover {
            background: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
        }
        @keyframes pulse-red {
            0% { transform: scale(0.95); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(0.95); opacity: 1; }
        }
        .pulse-dot { animation: pulse-red 2s infinite; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-6 border-b border-white/5 glass sticky top-0 z-[100]">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="h-2 w-2 bg-blue-500 rounded-full shadow-[0_0_10px_#3b82f6]"></div>
                <h1 class="text-xl font-bold tracking-tighter neon-blue uppercase italic">AssetPulse <span class="text-white">AI</span></h1>
            </div>
            <div class="flex items-center space-x-4">
                <div class="hidden md:block text-[9px] font-mono text-blue-400/60 tracking-[0.2em]">ENCRYPTED TERMINAL V54.0</div>
                <div class="text-[10px] font-mono text-green-500 bg-green-500/10 px-3 py-1 rounded border border-green-500/20 uppercase">Secure Connection</div>
            </div>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-6 pt-20 pb-16 text-center">
        <h2 class="text-6xl md:text-8xl font-bold tracking-tighter mb-4 italic uppercase leading-none">
            Institutional <br><span class="text-blue-600">Liquidity</span> Pool
        </h2>
        <p class="text-gray-600 text-[10px] tracking-[0.5em] uppercase font-bold mt-6">Private Alpha Terminal &bull; AI-Powered Strategic Node Discovery</p>
    </header>

    <main class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10" id="asset-grid">
        <div class="col-span-full text-center py-40">
            <div class="inline-block h-8 w-8 border-2 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
            <p class="font-mono text-gray-700 text-xs tracking-widest">SYNCHRONIZING WITH GLOBAL NODES...</p>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 bg-black/98 hidden z-[200] flex items-center justify-center p-4 backdrop-blur-3xl">
        <div class="glass w-full max-w-2xl rounded-[3rem] overflow-hidden border border-white/10 shadow-2xl animate-in fade-in zoom-in duration-300">
            <div class="p-10 md:p-14">
                <div class="flex justify-between items-start mb-10">
                    <div>
                        <h3 id="modal-id" class="text-4xl font-bold tracking-tighter text-white italic uppercase"></h3>
                        <div class="flex items-center space-x-2 mt-2">
                            <span id="modal-sector" class="text-blue-500 text-[10px] font-bold uppercase tracking-widest"></span>
                            <span class="h-1 w-1 bg-gray-700 rounded-full"></span>
                            <span class="text-green-500 text-[10px] font-mono">VERIFIED NODE</span>
                        </div>
                    </div>
                    <button onclick="closeModal()" class="h-12 w-12 flex items-center justify-center rounded-full border border-white/5 text-gray-500 hover:text-white hover:bg-white/5 transition text-2xl">✕</button>
                </div>
                
                <div id="audit-content" class="bg-black/40 p-8 rounded-[2rem] border border-white/5 text-sm leading-relaxed h-72 overflow-y-auto mb-10 text-gray-400 italic font-light">
                    </div>

                <div class="space-y-4">
                    <button id="pay-btn" onclick="startPayment()" class="w-full py-6 btn-main text-white font-bold rounded-[2rem] transition-all text-xl uppercase tracking-tighter">
                        Open Audit Protocol ($19)
                    </button>
                    <p class="text-center text-[9px] text-gray-600 uppercase tracking-widest font-medium">Identity Reveal & VC Roadmap instantly after checkout</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentAssetId = null;

        // Logic for Dynamic Valuation & Stats
        function generateStats(id) {
            const seed = id.split('-')[1] || "1234";
            const val = (parseFloat(seed) / 100).toFixed(1);
            const roi = Math.floor(parseFloat(seed) / 12);
            const score = (9 + (parseInt(seed) % 9) / 10).toFixed(1);
            const buyers = (parseInt(seed) % 7) + 3;
            return { val, roi, score, buyers };
        }

        async function fetchAssets() {
            try {
                const res = await fetch('/hunted');
                const data = await res.json();
                const container = document.getElementById('asset-grid');
                
                container.innerHTML = data.assets.map(asset => {
                    const stats = generateStats(asset.id);
                    return `
                    <div class="glass p-10 rounded-[3rem] card-glow cursor-pointer relative overflow-hidden group" onclick="openAudit('${asset.id}', '${asset.sector}')">
                        <div class="roi-badge absolute top-0 right-0 px-6 py-2 text-[10px] font-bold text-white rounded-bl-3xl">
                            +${stats.roi}% ROI
                        </div>

                        <div class="mb-10">
                            <span class="text-[10px] font-bold text-gray-500 uppercase tracking-[0.3em]">${asset.sector}</span>
                            <div class="flex items-center text-[10px] text-red-500 font-bold mt-2 uppercase tracking-tight">
                                <span class="h-2 w-2 bg-red-500 rounded-full mr-2 pulse-dot"></span>
                                ${stats.buyers} Qualified Buyers Active
                            </div>
                        </div>

                        <h3 class="text-4xl font-bold text-white tracking-tighter italic uppercase mb-2 group-hover:text-blue-400 transition">Strategic Node</h3>
                        <p class="text-[10px] font-mono text-gray-700 mb-12 tracking-widest">${asset.id}</p>
                        
                        <div class="flex justify-between items-end border-t border-white/5 pt-8">
                            <div>
                                <p class="text-[8px] text-gray-600 uppercase font-bold tracking-[0.2em] mb-1">Est. Valuation</p>
                                <p class="text-4xl font-bold text-white tracking-tighter">$${stats.val}K</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[8px] text-gray-600 uppercase font-bold tracking-[0.2em] mb-1">Audit Score</p>
                                <p class="text-3xl font-bold text-blue-600 italic font-serif">${stats.score}</p>
                            </div>
                        </div>

                        <div class="mt-8 text-[9px] text-gray-800 font-bold uppercase tracking-[0.3em]">
                            Status: <span class="text-blue-900">Negotiation In-Progress</span>
                        </div>
                    </div>
                    `;
                }).join('');
            } catch (e) {
                console.error("Neural Link Offline.");
            }
        }

        async function openAudit(id, sector) {
            currentAssetId = id;
            document.getElementById('modal-id').innerText = id;
            document.getElementById('modal-sector').innerText = sector;
            document.getElementById('modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
            document.getElementById('audit-content').innerHTML = `
                <div class="flex flex-col items-center justify-center h-full space-y-3">
                    <div class="h-4 w-4 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                    <span class="text-[10px] font-mono uppercase tracking-widest">Deciphering VC Signal...</span>
                </div>
            `;

            const res = await fetch(`/safe_report?asset_id=${id}`);
            const data = await res.json();
            document.getElementById('audit-content').innerText = data.result;
        }

        async function startPayment() {
            const btn = document.getElementById('pay-btn');
            const oldText = btn.innerText;
            btn.innerText = "REDIRECTING TO GATEWAY...";
            btn.disabled = true;

            try {
                const res = await fetch(`/create_checkout?asset_id=${currentAssetId}`);
                const data = await res.json();
                if (data.checkout_url) {
                    window.location.href = data.checkout_url;
                } else {
                    throw new Error();
                }
            } catch (e) {
                alert("Institutional Bridge Reset. Please try again.");
                btn.innerText = oldText;
                btn.disabled = false;
            }
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Initialize Hunt
        fetchAssets();
    </script>
</body>
</html>
