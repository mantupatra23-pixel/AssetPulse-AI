<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetPulse AI | Institutional Discovery Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f1f5f9; 
            margin: 0; 
            color: #0f172a;
        }

        .premium-card { 
            background: white; 
            border: 1px solid #e2e8f0; 
            border-radius: 1.5rem; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        .premium-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border-color: #3b82f6;
        }

        .btn-action { 
            background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%); 
            color: white; 
            transition: all 0.2s ease;
        }

        .btn-action:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }

        .blur-text { 
            filter: blur(12px); 
            user-select: none; 
            pointer-events: none; 
        }

        .modal-animate {
            animation: modalFade 0.3s ease-out;
        }

        @keyframes modalFade {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <div class="max-w-[1600px] mx-auto min-h-screen">
        <header class="py-12 px-6 md:px-12 flex flex-col md:flex-row justify-between items-start md:items-center">
            <div>
                <h1 class="text-5xl font-extrabold italic tracking-tighter text-slate-900">
                    AssetPulse <span class="text-blue-600">AI</span>
                </h1>
                <p class="text-slate-500 font-bold mt-2 uppercase text-[10px] tracking-[0.3em]">
                    Institutional Multi-Modal Discovery Terminal
                </p>
            </div>
            <div class="mt-6 md:mt-0 flex items-center gap-4">
                <div class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></div>
                <span class="text-xs font-black uppercase tracking-widest text-slate-400">Live Global Feed</span>
            </div>
        </header>

        <div id="assetContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6 px-6 md:px-12 pb-20">
            <div class="col-span-full py-20 text-center text-slate-400 font-bold italic">
                Scanning global nodes...
            </div>
        </div>
    </div>

    <div id="reportModal" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md hidden z-[1000] items-center justify-center p-4">
        <div class="bg-white w-full max-w-4xl rounded-[2.5rem] shadow-2xl flex flex-col max-h-[92vh] overflow-hidden relative modal-animate">
            
            <button onclick="closeReport()" class="absolute top-6 right-8 text-4xl font-light text-slate-300 hover:text-slate-900 transition-colors">&times;</button>
            
            <div class="p-8 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0 z-10">
                <div>
                    <h3 id="modalSub" class="text-xl font-black text-slate-900 italic tracking-tight">ASSET-NODE</h3>
                    <p class="text-[10px] font-bold text-blue-600 uppercase tracking-widest mt-1">Confidential Institutional Audit</p>
                </div>
                <div class="bg-red-50 px-6 py-2 rounded-2xl border border-red-100">
                    <p id="timer" class="text-lg font-black text-red-500 tabular-nums">15:00</p>
                </div>
            </div>

            <div class="p-8 md:p-12 overflow-y-auto relative bg-white flex-1">
                <div id="clearText" class="text-slate-900 font-extrabold mb-8 text-xl border-l-8 border-blue-600 pl-6 italic leading-snug">
                    </div>
                
                <div id="reportText" class="text-slate-500 text-lg leading-relaxed blur-text space-y-6">
                    </div>
                
                <div id="paywall" class="absolute inset-0 flex items-center justify-center bg-gradient-to-t from-white via-white/95 to-transparent pt-32 pb-12">
                    <div class="bg-white p-10 rounded-[3rem] shadow-[0_32px_64px_-15px_rgba(0,0,0,0.2)] border border-slate-100 text-center max-w-sm w-full mx-4">
                        <div class="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-6">
                            <svg class="w-8 h-8 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </div>
                        <h4 class="text-2xl font-black mb-2 italic text-slate-900 uppercase tracking-tighter">Security Protocol</h4>
                        <p class="text-slate-400 text-[10px] mb-10 font-bold uppercase tracking-[0.2em]">Unlock Asset Identity</p>
                        
                        <button onclick="instantBuy()" class="btn-action w-full py-6 rounded-2xl font-black text-xs uppercase tracking-widest shadow-2xl hover:scale-105 active:scale-95 transition-all">
                            Reveal Identity (₹5)
                        </button>
                        
                        <p class="mt-6 text-[9px] text-slate-400 font-bold uppercase tracking-widest italic">Encrypted Stripe Transaction</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allAssets = [];
        let currentAssetId = null;
        let timerInterval = null;

        // 1. Fetch Assets from Backend
        async function loadAssets() {
            try {
                const res = await fetch('/hunted');
                const data = await res.json();
                allAssets = data.assets;
                
                const container = document.getElementById('assetContainer');
                container.innerHTML = allAssets.map(a => `
                    <div class="premium-card p-10 flex flex-col justify-between">
                        <div>
                            <span class="text-[9px] font-black text-blue-600 uppercase tracking-[0.2em] bg-blue-50 px-3 py-1 rounded-full">${a.sector}</span>
                            <h2 class="text-2xl font-black mt-6 italic uppercase tracking-tighter text-slate-900 leading-tight">Strategic Node</h2>
                            <p class="text-[10px] text-slate-400 font-bold mt-2 uppercase tracking-widest">${a.id}</p>
                        </div>
                        <button onclick="openModal('${a.id}')" class="btn-action w-full py-4 rounded-xl font-black text-[10px] uppercase mt-10 tracking-widest shadow-lg">
                            Generate Audit
                        </button>
                    </div>
                `).join('');
            } catch (err) {
                console.error("Discovery Error:", err);
            }
        }

        // 2. Timer Logic
        function startTimer() {
            let time = 15 * 60;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let m = Math.floor(time / 60);
                let s = time % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                if (time <= 0) {
                    clearInterval(timerInterval);
                    closeReport();
                }
                else time--;
            }, 1000);
        }

        // 3. Open Modal & Fetch AI Audit
        async function openModal(id) {
            currentAssetId = id;
            const modal = document.getElementById('reportModal');
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Stop scrolling
            document.getElementById('modalSub').innerText = id;
            
            startTimer();
            
            const res = await fetch(`/safe_report?asset_id=${id}`);
            const data = await res.json();
            
            // Show first 150 chars clearly
            const summary = data.result.substring(0, 160) + "...";
            document.getElementById('clearText').innerText = "EXECUTIVE SUMMARY: " + summary;
            
            // Show the rest blurred
            document.getElementById('reportText').innerText = data.result;
        }

        // 4. Close Modal
        function closeReport() {
            document.getElementById('reportModal').style.display = 'none';
            document.body.style.overflow = 'auto';
            clearInterval(timerInterval);
        }

        // 5. STRIPE REDIRECTION
        async function instantBuy() {
            if(!currentAssetId) return;
            
            const btn = document.querySelector('#paywall button');
            btn.innerText = "Connecting...";
            btn.disabled = true;

            try {
                const res = await fetch(`/create_checkout?asset_id=${currentAssetId}`);
                const data = await res.json();
                
                if(data.checkout_url) {
                    window.location.href = data.checkout_url;
                } else {
                    alert("Stripe Session Error. Please try again.");
                    btn.innerText = "Reveal Identity (₹5)";
                    btn.disabled = false;
                }
            } catch (err) {
                alert("Network Error");
                btn.innerText = "Reveal Identity (₹5)";
                btn.disabled = false;
            }
        }

        // Initialize on load
        window.onload = loadAssets;
    </script>
</body>
</html>
