<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetPulse AI | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0a0a0a; color: #00ff41; font-family: 'Courier New', Courier, monospace; }
        .neon-border { border: 1px solid #00ff41; box-shadow: 0 0 10px #00ff41; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-5 md:p-20">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-4xl font-bold mb-5 text-center tracking-widest uppercase">AssetPulse AI Engine</h1>
        <p class="text-center mb-10 text-gray-400">Digital Asset Arbitrage & Analysis v1.0</p>

        <div class="glass p-8 rounded-lg neon-border">
            <label class="block mb-2 text-sm uppercase">Enter Asset Name (Domain/Handle):</label>
            <input type="text" id="assetName" placeholder="e.g. mantu-tech.ai" 
                class="w-full p-3 bg-black border border-green-900 rounded mb-5 focus:outline-none focus:border-green-400 text-green-400">
            
            <button onclick="analyze()" id="btn" class="w-full bg-green-600 hover:bg-green-500 text-black font-bold py-3 rounded transition duration-300 uppercase">
                Start AI Analysis
            </button>
        </div>

        <div id="resultBox" class="hidden mt-10 p-8 glass rounded-lg border border-gray-800">
            <h2 class="text-xl mb-4 underline">AI Analysis Result:</h2>
            <div id="resultContent" class="whitespace-pre-wrap text-gray-300 leading-relaxed"></div>
        </div>
    </div>

    <script>
        async function analyze() {
            const name = document.getElementById('assetName').value;
            const btn = document.getElementById('btn');
            const resultBox = document.getElementById('resultBox');
            const resultContent = document.getElementById('resultContent');

            if(!name) return alert("Enter a name!");

            btn.innerText = "Analyzing...";
            btn.disabled = true;

            try {
                const response = await fetch(`/analyze?name=${name}`);
                const data = await response.json();
                
                resultBox.classList.remove('hidden');
                resultContent.innerText = data.analysis || data.error;
            } catch (err) {
                resultContent.innerText = "Error connecting to backend.";
            } finally {
                btn.innerText = "Start AI Analysis";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
