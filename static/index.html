<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetPulse Pro | Premium AI Discovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ededed; }
        .glass { background: rgba(15, 15, 15, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        .sticky-header { position: sticky; top: 0; z-index: 50; background: #000; border-bottom: 1px solid #1d4ed8; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1d4ed8; border-radius: 10px; }
        .modal-animate { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="p-4 md:p-10 min-h-screen">

    <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center mb-12 gap-4">
        <div class="text-left">
            <h1 class="text-4xl font-black tracking-tighter text-blue-600">ASSETPULSE PRO</h1>
            <p class="text-gray-500 text-[10px] uppercase tracking-[0.2em]">Institutional Digital Asset Monitoring • v4.5 Active</p>
        </div>
        <div class="flex items-center gap-3">
            <div class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></div>
            <span class="text-[10px] font-bold text-green-500 uppercase">Neural Node Secured</span>
        </div>
    </div>

    <div class="max-w-7xl mx-auto glass rounded-3xl overflow-hidden shadow-[0_0_50px_rgba(0,0,0,0.5)]">
        <div class="overflow-x-auto max-h-[750px] overflow-y-auto">
            <table class="w-full text-left border-collapse">
                <thead class="sticky-header text-blue-500 uppercase text-[11px] font-black">
                    <tr>
                        <th class="px-8 py-5">Asset Identity</th>
                        <th class="px-8 py-5">Classification</th>
                        <th class="px-8 py-5">Market Signal</th>
                        <th class="px-8 py-5 text-center">Acquisition / Intel</th>
                    </tr>
                </thead>
                <tbody id="assetTable" class="divide-y divide-white/5">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="reportModal" class="fixed inset-0 bg-black/95 hidden items-center justify-center z-[100] p-4 backdrop-blur-xl">
        <div class="glass w-full max-w-2xl rounded-[2.5rem] p-10 relative modal-animate shadow-[0_0_100px_rgba(37,99,235,0.2)]">
            <button onclick="closeReport()" class="absolute top-6 right-8 text-gray-500 hover:text-white text-3xl font-light">&times;</button>
            
            <div class="mb-8">
                <h2 class="text-blue-600 font-black text-2xl uppercase tracking-tighter">Strategic Analysis</h2>
                <p id="modalSub" class="text-gray-500 text-[10px] uppercase font-bold mt-1 tracking-widest">Neural Pitch Generation Active</p>
            </div>

            <div id="reportText" class="text-gray-300 leading-relaxed font-normal text-sm bg-blue-900/10 p-8 rounded-3xl border border-blue-500/20 max-h-[400px] overflow-y-auto italic">
                Awaiting secure stream...
            </div>

            <div class="mt-10 flex flex-wrap gap-4">
                <button onclick="window.print()" class="bg-white text-black px-8 py-3 rounded-full font-black text-[10px] uppercase hover:bg-blue-600 hover:text-white transition-all">Export PDF</button>
                <button onclick="closeReport()" class="border border-white/10 text-white px-8 py-3 rounded-full font-black text-[10px] uppercase hover:bg-white/10 transition-all">Close Console</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Assets Fetching
        async function loadAssets() {
            try {
                const res = await fetch('/hunted');
                const data = await res.json();
                const container = document.getElementById('assetTable');
                
                container.innerHTML = data.assets.map(a => `
                    <tr class="hover:bg-blue-600/[0.03] transition-colors border-b border-white/5">
                        <td class="px-8 py-6 font-bold text-white tracking-tight">${a.name}</td>
                        <td class="px-8 py-6">
                            <span class="bg-blue-900/20 text-blue-400 border border-blue-500/20 px-2 py-1 rounded text-[9px] uppercase font-black">${a.type}</span>
                        </td>
                        <td class="px-8 py-6">
                            <span class="text-[10px] font-bold text-green-500 uppercase flex items-center gap-2">
                                <div class="h-1 w-1 bg-green-500 rounded-full"></div> Verified Expired
                            </span>
                        </td>
                        <td class="px-8 py-6">
                            <div class="flex items-center justify-center gap-3">
                                <button onclick="generateReport('${a.name}')" class="bg-white text-black px-4 py-2 rounded-lg text-[9px] font-black uppercase hover:bg-blue-600 hover:text-white transition-all">Safe Pitch</button>
                                <a href="${a.buy_url}" target="_blank" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-[9px] font-black uppercase hover:bg-blue-700 transition-all">Buy Partner</a>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (err) { 
                console.error("Sync Error:", err); 
            }
        }

        // 2. Report Generation Logic
        async function generateReport(name) {
            const modal = document.getElementById('reportModal');
            const textDiv = document.getElementById('reportText');
            const subText = document.getElementById('modalSub');
            
            // Modal Open
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            subText.innerText = "Processing Identity: " + name;
            textDiv.innerHTML = "Accessing encrypted data from Neural Node...";

            try {
                // Call backend safe_report API
                const res = await fetch(`/safe_report?name=${encodeURIComponent(name)}`);
                const data = await res.json();
                
                if (data.result) {
                    textDiv.innerHTML = data.result;
                } else {
                    textDiv.innerHTML = "Error: " + (data.error || "Generation blocked.");
                }
            } catch (err) {
                textDiv.innerHTML = "Fatal Error: Connection to Groq API severed.";
            }
        }

        // 3. Modal Close
        function closeReport() {
            document.getElementById('reportModal').classList.add('hidden');
            document.getElementById('reportModal').classList.remove('flex');
        }

        window.onload = loadAssets;
    </script>
</body>
</html>
