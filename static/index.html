<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AssetPulse AI | Global Institutional Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            color: #1e293b;
            min-height: 100vh;
            margin: 0;
            padding: 0;
        }

        .premium-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 2rem;
            box-shadow: 0 4px 20px -2px rgba(0, 0, 0, 0.05);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .premium-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08); 
            border-color: #2563eb;
        }

        .btn-main {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.3);
            transition: all 0.3s ease;
        }

        .btn-main:active { transform: scale(0.95); }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .loader {
            border: 3px solid #f1f5f9;
            border-top: 3px solid #2563eb;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .timer-red { color: #ef4444; font-variant-numeric: tabular-nums; }
    </style>
</head>
<body class="p-4 md:p-10 lg:p-20 pb-36">

    <header class="flex flex-col gap-1 mb-12 mt-6">
        <div class="flex items-center gap-2 mb-2">
            <span class="flex h-2 w-2 rounded-full bg-blue-600 animate-ping"></span>
            <span class="text-[10px] uppercase tracking-[0.3em] text-blue-600 font-extrabold">Global Predator Node Live</span>
        </div>
        <h1 class="text-5xl font-extrabold tracking-tight text-slate-900 italic">AssetPulse <span class="text-blue-600">AI</span></h1>
        <p class="text-slate-500 text-sm font-semibold tracking-wide">Autonomous VC-Grade Audit & Acquisition Engine</p>
    </header>

    <div class="grid grid-cols-2 gap-4 mb-10">
        <div class="premium-card p-6 border-b-4 border-blue-600">
            <p class="text-[9px] uppercase text-slate-400 font-black tracking-widest mb-1">Signal Health</p>
            <h4 class="text-3xl font-bold text-slate-900 tracking-tighter">99.8%</h4>
        </div>
        <div class="premium-card p-6 border-b-4 border-indigo-600">
            <p class="text-[9px] uppercase text-slate-400 font-black tracking-widest mb-1">Sniper Status</p>
            <h4 class="text-3xl font-bold text-indigo-600 tracking-tighter italic uppercase">Active</h4>
        </div>
    </div>

    <div class="mb-12 sticky top-6 z-40">
        <input type="text" id="searchInput" onkeyup="filterAssets()" placeholder="Search high-liquidity nodes (.ai, .io, .com)..." 
               class="w-full premium-card px-8 py-6 text-base font-bold outline-none focus:ring-4 ring-blue-500/20 shadow-2xl">
    </div>

    <div id="assetContainer" class="flex flex-col gap-6">
        </div>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[92%] max-w-lg bg-white/90 backdrop-blur-2xl p-4 flex justify-between items-center z-50 rounded-[2.5rem] border border-slate-200 shadow-2xl">
        <button onclick="location.reload()" class="p-4 text-slate-400 hover:text-blue-600 transition-colors">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
        </button>
        <button onclick="alert('Targeting US-East & European Nodes...')" class="btn-main px-12 py-4 rounded-3xl text-[10px] font-black uppercase tracking-[0.2em] shadow-xl">Manual Sniper Scan</button>
        <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="p-4 text-slate-400 hover:text-blue-600">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 10l7-7m0 0l7 7m-7-7v18" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
        </button>
    </nav>

    <div id="reportModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xl hidden flex-col z-[100] p-4 md:p-12">
        <div class="bg-white w-full max-w-5xl mx-auto rounded-[3rem] shadow-2xl flex flex-col h-full overflow-hidden relative border border-white/20">
            <button onclick="closeReport()" class="absolute top-8 right-10 text-5xl font-thin text-slate-400 hover:text-slate-900 transition-all">&times;</button>
            
            <div class="p-8 md:p-16 overflow-y-auto flex-1 no-scrollbar">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-6 mb-12">
                    <div>
                        <span class="text-blue-600 font-black text-[10px] uppercase tracking-[0.4em] mb-2 block">Institutional Intelligence Audit</span>
                        <h3 id="modalSub" class="text-4xl md:text-5xl font-black text-slate-900 tracking-tighter uppercase italic">LOCKED</h3>
                    </div>
                    <div class="bg-slate-50 px-8 py-5 rounded-[2rem] border border-slate-100 flex flex-col items-end">
                        <span class="text-[10px] text-red-500 font-black uppercase tracking-widest mb-1">Audit Link Expiring</span>
                        <p id="timer" class="text-3xl font-bold timer-red">15:00</p>
                    </div>
                </div>

                <div class="flex gap-3 mb-10 overflow-x-auto no-scrollbar pb-2">
                    <button onclick="changeLang('English')" class="lang-btn bg-blue-600 text-white px-8 py-3 rounded-2xl text-[11px] font-black uppercase tracking-widest">English</button>
                    <button onclick="changeLang('Arabic')" class="lang-btn bg-slate-100 text-slate-500 px-8 py-3 rounded-2xl text-[11px] font-black uppercase tracking-widest">Arabic</button>
                    <button onclick="changeLang('Spanish')" class="lang-btn bg-slate-100 text-slate-500 px-8 py-3 rounded-2xl text-[11px] font-black uppercase tracking-widest">Spanish</button>
                    <button onclick="changeLang('Hindi')" class="lang-btn bg-slate-100 text-slate-500 px-8 py-3 rounded-2xl text-[11px] font-black uppercase tracking-widest">Hindi</button>
                </div>

                <div id="reportText" class="bg-slate-50 p-10 md:p-14 rounded-[2.5rem] text-slate-700 leading-relaxed text-sm md:text-lg italic border border-slate-100 min-h-[400px] shadow-inner">
                    Establishing secure handshake with decentralized nodes...
                </div>
            </div>

            <div class="p-10 md:p-14 bg-slate-50/80 border-t border-slate-100 grid grid-cols-1 md:grid-cols-3 gap-5">
                <button onclick="downloadPDF()" class="bg-slate-900 text-white py-6 rounded-3xl font-black text-[11px] uppercase tracking-[0.2em] shadow-xl hover:bg-black transition-all">Download PDF</button>
                <button onclick="unlockIdentity()" class="bg-white border-2 border-slate-200 text-slate-900 py-6 rounded-3xl font-black text-[11px] uppercase tracking-[0.2em] hover:border-blue-600 transition-all">Unlock Info</button>
                <button onclick="instantBuy()" class="btn-main py-6 rounded-3xl font-black text-[11px] uppercase tracking-[0.2em] shadow-2xl">Instant Buy ($99)</button>
            </div>
        </div>
    </div>

    <script>
        let allAssets = [];
        let currentAsset = null;
        let timerInterval;
        let currentLang = "English";

        async function loadAssets() {
            try {
                const res = await fetch('/hunted');
                const data = await res.json();
                allAssets = data.assets;
                renderCards(allAssets);
            } catch(e) { console.error("Node Connection Offline"); }
        }

        function renderCards(assets) {
            const container = document.getElementById('assetContainer');
            container.innerHTML = assets.map(a => `
                <div class="premium-card p-10 flex flex-col gap-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[10px] text-slate-400 font-black uppercase tracking-widest mb-2">${a.id}</p>
                            <h2 class="text-3xl font-black text-slate-900 italic tracking-tighter">${a.name}</h2>
                        </div>
                        <div class="flex items-center gap-2 bg-green-50 px-4 py-2 rounded-full border border-green-100">
                            <span class="h-2 w-2 bg-green-500 rounded-full animate-pulse"></span>
                            <span class="text-[10px] text-green-700 font-black uppercase">Verified</span>
                        </div>
                    </div>
                    <button onclick="openModal('${a.name}', '${a.id}')" class="btn-main py-6 rounded-3xl font-black text-[12px] uppercase tracking-[0.2em] italic">Analyze Strategy</button>
                </div>
            `).join('');
        }

        function filterAssets() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allAssets.filter(a => a.name.toLowerCase().includes(val) || a.id.toLowerCase().includes(val));
            renderCards(filtered);
        }

        async function openModal(hiddenName, id) {
            currentAsset = { hiddenName, id };
            document.getElementById('reportModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            document.getElementById('modalSub').innerText = id;
            document.getElementById('reportText').innerHTML = '<div class="flex justify-center py-20"><div class="loader"></div></div>';
            
            startTimer();
            const res = await fetch(`/safe_report?name=${encodeURIComponent(hiddenName)}&lang=${currentLang}`);
            const data = await res.json();
            document.getElementById('reportText').innerText = data.result;
        }

        function startTimer() {
            let time = 900;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let mins = Math.floor(time / 60);
                let secs = time % 60;
                document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (time <= 0) { 
                    clearInterval(timerInterval); 
                    document.getElementById('reportText').innerText = "INSTITUTIONAL LINK EXPIRED. PLEASE REFRESH PROTOCOL."; 
                }
                time--;
            }, 1000);
        }

        async function changeLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => {
                b.classList.remove('bg-blue-600', 'text-white');
                b.classList.add('bg-slate-100', 'text-slate-500');
            });
            event.target.classList.remove('bg-slate-100', 'text-slate-500');
            event.target.classList.add('bg-blue-600', 'text-white');
            openModal(currentAsset.hiddenName, currentAsset.id);
        }

        function closeReport() { 
            document.getElementById('reportModal').style.display = 'none'; 
            document.body.style.overflow = 'auto';
            clearInterval(timerInterval); 
        }

        async function instantBuy() {
            const res = await fetch(`/create_checkout?asset_id=${currentAsset.id}`);
            const data = await res.json();
            if(data.checkout_url) window.open(data.checkout_url, '_blank');
        }

        async function unlockIdentity() {
            const email = prompt("ENTER AUTHORIZED EMAIL FOR IDENTITY RELEASE:");
            if(email) {
                alert("Protocol Unlocked. High-liquidity identity dispatched to email.");
                await fetch(`/unlock_identity?asset_id=${currentAsset.id}&buyer_email=${encodeURIComponent(email)}`);
            }
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(22);
            doc.text("ASSETPULSE STRATEGIC AUDIT", 10, 20);
            doc.setFontSize(10);
            const text = doc.splitTextToSize(document.getElementById('reportText').innerText, 180);
            doc.text(text, 10, 40);
            doc.save(`Institutional_Audit_${currentAsset.id}.pdf`);
        }

        window.onload = loadAssets;
    </script>
</body>
</html>
