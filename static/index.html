<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetPulse AI | Professional Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; color: #111827; }
        .card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .btn-primary { background-color: #2563eb; color: white; transition: all 0.3s; }
        .btn-primary:hover { background-color: #1d4ed8; }
        .hunted-item { cursor: pointer; transition: 0.2s; border-bottom: 1px solid #f3f4f6; }
        .hunted-item:hover { background-color: #eff6ff; color: #2563eb; }
    </style>
</head>
<body class="min-h-screen p-6">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10 pb-5 border-b">
            <div>
                <h1 class="text-3xl font-bold text-gray-900 tracking-tight">AssetPulse <span class="text-blue-600">AI</span></h1>
                <p class="text-sm text-gray-500 font-medium">Digital Asset Valuation & Acquisition Engine</p>
            </div>
            <div class="text-right">
                <span class="px-3 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full uppercase">System Live</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="card p-6 h-fit">
                <h2 class="text-lg font-semibold mb-4 flex items-center">
                    <span class="mr-2">🔍</span> Live Discoveries
                </h2>
                <div id="huntedList" class="space-y-1">
                    <p class="text-sm text-gray-400 italic">Scanning new assets...</p>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="card p-8">
                    <label class="block text-sm font-semibold text-gray-700 mb-3 uppercase tracking-wider">Target Asset Domain</label>
                    <div class="flex gap-3">
                        <input type="text" id="assetInput" placeholder="example-brand.ai" 
                            class="flex-1 p-4 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none text-lg font-medium">
                    </div>
                    <div class="grid grid-cols-2 gap-4 mt-6">
                        <button onclick="execute('analyze')" class="btn-primary py-4 rounded-lg font-bold shadow-lg">Generate Full Report</button>
                        <button onclick="execute('find_buyers')" class="border-2 border-gray-900 py-4 rounded-lg font-bold hover:bg-gray-900 hover:text-white transition-all">Identify Buyers</button>
                    </div>
                </div>

                <div id="output" class="hidden card p-8 bg-white overflow-hidden">
                    <div class="flex items-center justify-between mb-6 border-b pb-4">
                        <h3 class="text-xl font-bold uppercase tracking-tight">Asset Documentation</h3>
                        <button onclick="window.print()" class="text-xs font-bold text-blue-600 hover:underline">Download PDF</button>
                    </div>
                    <div id="report" class="prose prose-blue max-w-none text-gray-700 leading-relaxed text-sm"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchHunted() {
            try {
                const res = await fetch('/hunted');
                const data = await res.json();
                const list = document.getElementById('huntedList');
                list.innerHTML = data.assets.map(a => 
                    `<div onclick="document.getElementById('assetInput').value='${a}'" class="hunted-item p-3 text-sm font-medium rounded-md">${a}</div>`
                ).join('');
            } catch (e) { console.error(e); }
        }

        async function execute(action) {
            const input = document.getElementById('assetInput');
            const report = document.getElementById('report');
            const output = document.getElementById('output');
            
            if(!input.value) return;

            output.classList.remove('hidden');
            report.innerHTML = `<div class="flex items-center gap-2"><div class="animate-spin h-4 w-4 border-2 border-blue-600 border-t-transparent rounded-full"></div> Generating detailed documentation...</div>`;

            try {
                const res = await fetch(`/${action}?name=${encodeURIComponent(input.value)}`);
                const data = await res.json();
                // Format details for white theme
                report.innerHTML = data.result.replace(/\n/g, '<br>');
            } catch (e) {
                report.innerText = "Error generating report.";
            }
        }

        fetchHunted();
        setInterval(fetchHunted, 60000);
    </script>
</body>
</html>
