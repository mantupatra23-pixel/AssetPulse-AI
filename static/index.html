<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AssetPulse AI | Strategic Discovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; 
            color: #0f172a; 
            margin: 0; 
            padding-bottom: 140px; 
            overflow-x: hidden; 
        }

        /* UI FIX: Full Screen Coverage - No Side Gaps */
        .full-wrapper {
            width: 100vw;
            padding: 20px;
            margin: 0;
        }

        .premium-card { 
            background: white; 
            border: 1px solid #e2e8f0; 
            border-radius: 1.5rem; 
            transition: all 0.3s ease; 
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .premium-card:hover { 
            transform: translateY(-8px); 
            border-color: #3b82f6; 
            box-shadow: 0 30px 60px -15px rgba(0,0,0,0.12); 
        }

        .btn-action { 
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%); 
            color: white; 
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.3); 
        }

        .blur-text { filter: blur(14px); user-select: none; pointer-events: none; }
        
        .ticker-bar { background: #0f172a; color: #f1f5f9; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        .marquee-content { display: inline-block; white-space: nowrap; animation: marquee 35s linear infinite; }
        
        .loader-spin { border: 3px solid #f1f5f9; border-top: 3px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="w-full">

    <div class="ticker-bar py-3.5 sticky top-0 z-[100] border-b border-white/5 backdrop-blur-md bg-opacity-95">
        <div class="marquee-content text-center">
            <span class="mx-10 text-green-400">● ASSET ACQUIRED BY TECH-GROUP FOR $12,500</span>
            <span class="mx-10 text-blue-400">● STRATEGIC NODE DISCOVERED IN FINTECH SECTOR</span>
            <span class="mx-10 text-yellow-400">● ENCRYPTED BY GLOBAL BANKING STANDARDS</span>
        </div>
    </div>

    <div class="full-wrapper">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-end px-4">
            <div>
                <h1 class="text-4xl md:text-6xl font-extrabold italic tracking-tighter">AssetPulse <span class="text-blue-600">AI</span></h1>
                <p class="text-slate-500 font-bold mt-2">Institutional Strategic Discovery & Valuation Engine</p>
            </div>
            <div class="hidden md:block bg-white px-6 py-3 rounded-2xl border border-slate-100 shadow-sm">
                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Global Status</p>
                <p class="text-green-600 font-bold">● LIVE BUYER MONITORING ACTIVE</p>
            </div>
        </header>

        <div class="mb-10 px-4">
            <input type="text" id="searchInput" onkeyup="filterAssets()" placeholder="Filter Strategic Sectors..." 
                   class="w-full premium-card px-8 py-6 text-xl font-bold outline-none border-none shadow-2xl">
        </div>

        <div id="assetContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-6 px-4">
            </div>
    </div>

    <div id="reportModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-3xl hidden z-[200] items-center justify-center p-3">
        <div class="bg-white w-full max-w-5xl rounded-[3rem] shadow-2xl flex flex-col max-h-[92vh] overflow-hidden relative border-8 border-blue-600/10">
            <button onclick="closeReport()" class="absolute top-6 right-8 text-5xl font-light text-slate-300 hover:text-slate-900 z-[210]">&times;</button>
            <div class="p-8 border-b border-slate-100 bg-white flex justify-between items-center">
                <h3 id="modalSub" class="text-2xl font-black text-slate-900 italic uppercase">SECURE_NODE</h3>
                <div class="bg-slate-50 px-5 py-2 rounded-2xl border border-slate-100">
                    <p id="timer" class="text-xl font-bold text-red-500 font-mono">15:00</p>
                </div>
            </div>
            <div class="p-8 md:p-14 overflow-y-auto flex-1 no-scrollbar bg-slate-50/40 relative">
                <div id="clearText" class="text-slate-900 font-bold mb-8 text-xl border-l-4 border-blue-600 pl-6 leading-relaxed italic"></div>
                <div id="reportText" class="text-slate-700 leading-relaxed text-base italic font-medium blur-text"></div>
                
                <div id="paywall" class="absolute inset-x-0 bottom-0 top-44 flex items-center justify-center z-[205] bg-gradient-to-t from-white via-white/95 to-transparent">
                    <div class="bg-white p-10 rounded-[3rem] shadow-2xl border border-blue-100 text-center max-w-sm">
                        <h4 class="text-3xl font-black mb-4 italic">Unlock Protocol</h4>
                        <button onclick="instantBuy()" class="btn-action w-full py-6 rounded-[2rem] font-black text-[12px] uppercase tracking-widest shadow-2xl">Reveal Identity ($99)</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[94%] max-w-md bg-white/95 backdrop-blur-3xl p-4 flex justify-between items-center z-[110] rounded-[2.5rem] border border-slate-200 shadow-2xl">
        <button onclick="location.reload()" class="p-3 text-slate-400 font-black">↻</button>
        <button class="btn-action px-12 py-4 rounded-[2rem] text-[11px] font-black uppercase italic tracking-widest">Global Scan Active</button>
        <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="p-3 text-slate-400 font-black">↑</button>
    </nav>

    <script>
        let allAssets = [];
        let currentAsset = null;
        let timerInterval = null;

        async function loadAssets() {
            try {
                const res = await fetch('/hunted');
                const data = await res.json();
                allAssets = data.assets;
                renderCards(allAssets);
            } catch(e) { console.error("Signal Lost"); }
        }

        function renderCards(assets) {
            document.getElementById('assetContainer').innerHTML = assets.map(a => {
                const randomVal = (Math.floor(Math.random() * 20) + 12) * 1000;
                const searchVol = (Math.floor(Math.random() * 60) + 20) + "k";
                return `
                <div class="premium-card p-8 border-l-8 border-blue-600 min-h-[340px]">
                    <div>
                        <span class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest">${a.sector}</span>
                        <p class="text-[10px] text-slate-400 font-bold mt-4 uppercase tracking-[0.2em] mb-1">${a.id}</p>
                        <h2 class="text-2xl font-black text-slate-900 italic uppercase leading-tight tracking-tighter uppercase">Strategic Node</h2>
                        <div class="mt-6">
                            <p class="text-[11px] text-slate-500 font-bold italic uppercase tracking-widest">VALUATION: <span class="text-green-600">$${randomVal.toLocaleString()}+</span></p>
                            <p class="text-[11px] text-slate-500 font-bold italic uppercase tracking-widest">SEARCH: <span class="text-blue-600">${searchVol}+</span></p>
                        </div>
                    </div>
                    <button onclick="openModal('${a.id}')" class="btn-action w-full py-5 rounded-[1.5rem] font-black text-[11px] uppercase italic mt-6">Generate Audit</button>
                </div>`;
            }).join('');
        }

        // TIMER LOGIC: 15 minutes countdown
        function startTimer() {
            let time = 15 * 60;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let mins = Math.floor(time / 60);
                let secs = time % 60;
                document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (time <= 0) clearInterval(timerInterval);
                else time--;
            }, 1000);
        }

        async function openModal(id) {
            currentAsset = { id };
            document.getElementById('reportModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            document.getElementById('modalSub').innerText = id;
            document.getElementById('reportText').innerHTML = '<div class="flex justify-center py-20"><div class="loader-spin"></div></div>';
            
            startTimer(); // Timer starts when modal opens
            
            const res = await fetch(`/safe_report?asset_id=${id}`);
            const data = await res.json();
            const text = data.result;
            document.getElementById('clearText').innerText = "EXECUTIVE SUMMARY: " + text.substring(0, 180) + "...";
            document.getElementById('reportText').innerText = text.substring(180);
        }

        function closeReport() { 
            document.getElementById('reportModal').style.display = 'none'; 
            document.body.style.overflow = 'auto'; 
            clearInterval(timerInterval);
        }

        async function instantBuy() {
            const res = await fetch(`/create_checkout?asset_id=${currentAsset.id}`);
            const data = await res.json();
            if(data.checkout_url) window.open(data.checkout_url, '_blank');
        }

        window.onload = loadAssets;
    </script>
</body>
</html>
