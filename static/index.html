<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetPulse Pro | Premium AI Discovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #ededed; }
        .glass { background: rgba(23, 23, 23, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .sticky-header { position: sticky; top: 0; z-index: 50; background: #000; border-bottom: 2px solid #2563eb; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #2563eb; border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto mb-10 text-center">
        <h1 class="text-5xl font-black tracking-tighter text-blue-500 mb-2">ASSETPULSE PRO</h1>
        <p class="text-gray-400 font-light">AI-Powered Premium Digital Asset Discovery & Valuation</p>
    </div>

    <div class="max-w-6xl mx-auto glass rounded-2xl overflow-hidden shadow-2xl">
        <div class="overflow-x-auto max-h-[700px] overflow-y-auto">
            <table class="w-full text-left border-collapse">
                <thead class="sticky-header text-blue-400 uppercase text-[12px] font-bold">
                    <tr>
                        <th class="px-6 py-4">ID</th>
                        <th class="px-6 py-4">Asset Name</th>
                        <th class="px-6 py-4">Type</th>
                        <th class="px-6 py-4">Status</th>
                        <th class="px-6 py-4 text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="assetTable" class="divide-y divide-white/5">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-black/90 hidden flex items-center justify-center p-4 z-[100]">
        <div class="glass w-full max-w-2xl rounded-3xl p-8 relative max-h-[90vh] overflow-y-auto">
            <button onclick="closeModal()" class="absolute top-4 right-6 text-2xl font-bold text-gray-500 hover:text-white">&times;</button>
            <div id="modalHeader" class="mb-6">
                <h2 id="modalTitle" class="text-2xl font-black text-blue-500 uppercase">Generating...</h2>
                <p id="modalSub" class="text-sm text-gray-400">Please wait while AI secures the asset data.</p>
            </div>
            <div id="modalContent" class="text-gray-300 leading-relaxed whitespace-pre-wrap italic border-l-4 border-blue-600 pl-4 bg-white/5 py-4">
                Loading...
            </div>
            <div class="mt-8 flex gap-4">
                <button onclick="window.print()" class="bg-white text-black px-6 py-2 rounded-full font-bold text-sm uppercase hover:bg-gray-200">Download PDF</button>
                <button onclick="closeModal()" class="border border-white/20 px-6 py-2 rounded-full font-bold text-sm uppercase hover:bg-white/10">Close</button>
            </div>
        </div>
    </div>

    <script>
        // Fetch and Render Assets
        async function loadAssets() {
            try {
                const res = await fetch('/hunted');
                const data = await res.json();
                const container = document.getElementById('assetTable');
                container.innerHTML = data.assets.map(a => `
                    <tr class="hover:bg-white/5 transition-all">
                        <td class="px-6 py-4 font-mono text-gray-500 text-sm">${a.id}</td>
                        <td class="px-6 py-4 font-bold text-white">${a.name}</td>
                        <td class="px-6 py-4 text-sm"><span class="bg-blue-900/30 text-blue-400 px-2 py-1 rounded text-[10px] uppercase font-bold">${a.type}</span></td>
                        <td class="px-6 py-4 text-xs font-bold text-green-500">${a.status}</td>
                        <td class="px-6 py-4">
                            <div class="flex items-center justify-center gap-2">
                                <button onclick="getSafeReport('${a.name}')" class="text-[10px] font-black bg-white text-black px-3 py-1.5 rounded uppercase hover:bg-blue-500 hover:text-white transition-all">Safe Pitch</button>
                                <button onclick="analyzeAsset('${a.name}')" class="text-[10px] font-black border border-white/20 px-3 py-1.5 rounded uppercase hover:bg-white hover:text-black">Audit</button>
                                <a href="${a.buy_url}" target="_blank" class="text-[10px] font-black bg-blue-600 text-white px-3 py-1.5 rounded uppercase hover:bg-blue-400 transition-all">Buy via Partner</a>
                            </div>
                        </td>
                    </tr>
                `).join('');
            } catch (err) { console.error("Error loading data:", err); }
        }

        // Stealth Report: No Identity Leak
        async function getSafeReport(name) {
            showModal("Generating Safe Report", "Protecting identity: " + name.replace(/./g, '*'));
            const res = await fetch(`/safe_report?name=${encodeURIComponent(name)}`);
            const data = await res.json();
            document.getElementById('modalContent').innerHTML = data.result || data.error;
            document.getElementById('modalTitle').innerText = "INVESTMENT PITCH (SECURE)";
        }

        // Full SEO Audit
        async function analyzeAsset(name) {
            showModal("Full SEO Audit", "Analyzing metrics for: " + name);
            const res = await fetch(`/analyze?name=${encodeURIComponent(name)}`);
            const data = await res.json();
            document.getElementById('modalContent').innerHTML = data.result || data.error;
            document.getElementById('modalTitle').innerText = "TECHNICAL SEO AUDIT";
        }

        function showModal(title, sub) {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalSub').innerText = sub;
            document.getElementById('modalContent').innerText = "AI is thinking... please hold.";
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        // Initial Load
        window.onload = loadAssets;
    </script>
</body>
</html>
