<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetPulse Pro | Institutional Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #030303; color: #ededed; }
        .glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.03); }
        .sticky-header { position: sticky; top: 0; z-index: 50; background: #000; border-bottom: 1px solid #2563eb; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #2563eb; border-radius: 10px; }
        .modal-animate { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-4 md:p-12 min-h-screen">

    <div class="max-w-7xl mx-auto flex justify-between items-end mb-16">
        <div>
            <h1 class="text-5xl font-black tracking-tighter text-blue-600 italic">ASSETPULSE PRO</h1>
            <p class="text-gray-600 text-[10px] uppercase tracking-[0.4em] mt-2 font-bold">Institutional Digital Real Estate Terminal</p>
        </div>
        <div class="text-right hidden md:block">
            <p class="text-green-500 text-[10px] font-black uppercase">● System Synced: Neural Node 01</p>
            <p class="text-gray-700 text-[9px] uppercase">Market Pulse: Active</p>
        </div>
    </div>

    <div class="max-w-7xl mx-auto glass rounded-[2rem] overflow-hidden shadow-2xl">
        <div class="overflow-x-auto max-h-[800px] overflow-y-auto">
            <table class="w-full text-left">
                <thead class="sticky-header text-blue-500 uppercase text-[10px] font-black tracking-widest">
                    <tr>
                        <th class="px-10 py-6">Reference ID</th>
                        <th class="px-10 py-6">Asset Classification</th>
                        <th class="px-10 py-6">Market Signal</th>
                        <th class="px-10 py-6 text-center">Protocol Actions</th>
                    </tr>
                </thead>
                <tbody id="assetTable" class="divide-y divide-white/5">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="reportModal" class="fixed inset-0 bg-black/98 hidden items-center justify-center z-[100] p-4 backdrop-blur-2xl">
        <div class="glass w-full max-w-3xl rounded-[3rem] p-12 relative modal-animate border border-blue-500/20 shadow-[0_0_80px_rgba(37,99,235,0.15)]">
            <button onclick="closeReport()" class="absolute top-8 right-10 text-gray-600 hover:text-white text-4xl font-thin transition-all">&times;</button>
            
            <div class="mb-10">
                <div class="flex items-center gap-3 mb-2">
                    <div class="h-1 w-12 bg-blue-600"></div>
                    <h2 class="text-blue-600 font-black text-xs uppercase tracking-[0.3em]">Institutional Intelligence</h2>
                </div>
                <h3 id="modalSub" class="text-2xl font-black text-white uppercase tracking-tighter italic">LOCKED ASSET AUDIT</h3>
            </div>

            <div id="reportText" class="text-gray-400 leading-[1.8] font-light text-sm bg-white/[0.02] p-10 rounded-[2rem] border border-white/5 max-h-[500px] overflow-y-auto whitespace-pre-wrap">
                Initiating neural data stream...
            </div>

            <div class="mt-12 flex flex-wrap gap-5">
                <button onclick="downloadPDF()" class="bg-blue-600 text-white px-10 py-4 rounded-full font-black text-[10px] uppercase tracking-widest hover:bg-white hover:text-black transition-all shadow-xl shadow-blue-900/20">Export Strategic PDF</button>
                <button onclick="requestAccess()" class="border border-white/10 text-white px-10 py-4 rounded-full font-black text-[10px] uppercase tracking-widest hover:bg-white/10 transition-all">Unlock Identity</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Data Loading
        async function loadAssets() {
            const res = await fetch('/hunted');
            const data = await res.json();
            const container = document.getElementById('assetTable');
            
            container.innerHTML = data.assets.map(a => `
                <tr class="hover:bg-blue-600/[0.02] transition-colors border-b border-white/[0.03]">
                    <td class="px-10 py-8">
                        <p class="text-[10px] text-gray-600 font-bold mb-1">${a.id}</p>
                        <p class="text-sm font-black text-white tracking-tight">${a.name}</p>
                    </td>
                    <td class="px-10 py-8">
                        <span class="bg-blue-900/10 text-blue-400 border border-blue-500/10 px-3 py-1.5 rounded-full text-[9px] font-black uppercase">${a.type}</span>
                    </td>
                    <td class="px-10 py-8">
                        <span class="text-[9px] font-black text-green-500 uppercase tracking-widest flex items-center gap-2">
                            <span class="h-1.5 w-1.5 bg-green-500 rounded-full shadow-[0_0_8px_#22c55e]"></span> ${a.status}
                        </span>
                    </td>
                    <td class="px-10 py-8">
                        <div class="flex items-center justify-center gap-4">
                            <button onclick="generateReport('${a.name}', '${a.id}')" class="bg-white text-black px-5 py-2.5 rounded-xl text-[9px] font-black uppercase hover:bg-blue-600 hover:text-white transition-all">Safe Pitch</button>
                            <button onclick="requestAccess('${a.id}')" class="border border-white/10 text-white px-5 py-2.5 rounded-xl text-[9px] font-black uppercase hover:bg-white/10 transition-all italic">Unlock</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // 2. Detailed Report Engine
        async function generateReport(hiddenName, id) {
            const modal = document.getElementById('reportModal');
            const textDiv = document.getElementById('reportText');
            const subText = document.getElementById('modalSub');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            subText.innerText = "AUDIT: " + id;
            textDiv.innerHTML = "Decrypting institutional market signals...";

            try {
                const res = await fetch(`/safe_report?name=${encodeURIComponent(hiddenName)}`);
                const data = await res.json();
                textDiv.innerHTML = data.result || "Error: Data stream interrupted.";
            } catch (err) {
                textDiv.innerHTML = "Connection Error: Failed to reach AI node.";
            }
        }

        // 3. Real PDF Download Logic
        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const reportContent = document.getElementById('reportText').innerText;
            const assetID = document.getElementById('modalSub').innerText;

            // PDF Design
            doc.setFillColor(10, 10, 10);
            doc.rect(0, 0, 210, 40, 'F');
            
            doc.setFont("helvetica", "bold");
            doc.setFontSize(22);
            doc.setTextColor(37, 99, 235);
            doc.text("ASSETPULSE PRO", 15, 20);
            
            doc.setFontSize(8);
            doc.setTextColor(150);
            doc.text("STRATEGIC MEMORANDUM | " + assetID, 15, 30);

            doc.setFont("helvetica", "normal");
            doc.setFontSize(10);
            doc.setTextColor(40);
            
            const splitText = doc.splitTextToSize(reportContent, 180);
            doc.text(splitText, 15, 55);

            doc.save(`AssetPulse_Audit_${assetID}.pdf`);
        }

        // 4. Identity Unlock Logic
        async function requestAccess(id) {
            const email = prompt("ENTER AUTHORIZED EMAIL TO UNLOCK IDENTITY:");
            if (email) {
                alert("Processing decryption... Check your inbox shortly.");
                await fetch(`/unlock_identity?asset_id=${id}&buyer_email=${encodeURIComponent(email)}`);
            }
        }

        function closeReport() {
            document.getElementById('reportModal').classList.add('hidden');
            document.getElementById('reportModal').classList.remove('flex');
        }

        window.onload = loadAssets;
    </script>
</body>
</html>
