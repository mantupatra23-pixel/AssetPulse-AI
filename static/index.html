<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AssetPulse Pro | Autonomous Arbitrage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; color: #101828; }
        
        /* Custom Scrollbar for 100 Assets */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }

        .glass-table { 
            background: white; 
            border: 1px solid #eaecf0; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px -4px rgba(0, 0, 0, 0.05);
            max-height: 650px;
            overflow-y: auto;
        }

        /* Sticky Header Logic */
        thead th {
            position: sticky;
            top: 0;
            z-index: 20;
            background: #f9fafb;
            border-bottom: 2px solid #eaecf0;
            font-size: 11px;
            font-weight: 700;
            color: #667085;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 16px 24px;
        }

        td { padding: 16px 24px; border-bottom: 1px solid #f2f4f7; font-size: 14px; }
        tr:hover { background: #f9fafb; cursor: pointer; }
        
        .status-pill { 
            padding: 4px 12px; 
            border-radius: 12px; 
            font-size: 12px; 
            font-weight: 600; 
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .status-high { background: #ecfdf3; color: #027a48; }
        
        .loader { border-top-color: #2563eb; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4 no-print">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight">AssetPulse <span class="text-blue-600">Pro</span></h1>
                <p class="text-sm text-slate-500 font-medium">Monitoring <span class="text-slate-900 font-bold">100+</span> Institutional Digital Assets</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex flex-col text-right">
                    <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Network Secure</span>
                    <span class="text-xs font-bold text-green-500 italic">● System Synced</span>
                </div>
                <button onclick="fetchPool()" class="p-2 bg-white border rounded-lg hover:bg-slate-50 shadow-sm transition">
                    <svg class="w-4 h-4 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8 no-print">
            <div class="md:col-span-2 relative">
                <input type="text" id="assetInput" placeholder="Select an asset from the pool below..." 
                    class="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold text-slate-800 shadow-sm focus:ring-4 focus:ring-blue-100 focus:border-blue-400 outline-none transition-all">
                <div class="absolute right-4 top-4 text-slate-300">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
            <button onclick="runAudit('analyze')" class="bg-blue-600 text-white font-bold rounded-2xl py-4 shadow-xl shadow-blue-200 hover:bg-blue-700 transition-all active:scale-95">AUDIT VALUE</button>
            <button onclick="runAudit('leads')" class="bg-slate-900 text-white font-bold rounded-2xl py-4 hover:bg-black transition-all active:scale-95">GET BUYERS</button>
        </div>

        <div class="glass-table custom-scroll no-print">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr>
                        <th>Asset Identity</th>
                        <th>Classification</th>
                        <th>Status</th>
                        <th>Market Signal</th>
                    </tr>
                </thead>
                <tbody id="assetTableBody">
                    </tbody>
            </table>
        </div>

        <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-4 z-50">
            <div class="bg-white rounded-3xl shadow-2xl max-w-3xl w-full p-8 md:p-12 relative max-h-[90vh] overflow-y-auto">
                <button onclick="closeModal()" class="absolute top-6 right-6 p-2 bg-slate-100 rounded-full hover:bg-slate-200 transition text-slate-500">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
                
                <div class="border-b border-slate-100 pb-6 mb-8">
                    <h2 id="modalTitle" class="text-2xl font-extrabold text-slate-900 uppercase tracking-tighter">Investment Report</h2>
                    <p class="text-xs font-bold text-blue-600 mt-2 uppercase tracking-widest">Confidential AI Audit</p>
                </div>

                <div id="modalContent" class="text-slate-700 leading-relaxed text-sm md:text-base whitespace-pre-wrap">
                    </div>

                <div class="mt-10 pt-8 border-t border-slate-100 flex flex-col md:flex-row justify-between items-center gap-4">
                    <button onclick="window.print()" class="text-xs font-black text-slate-900 border-2 border-slate-900 px-6 py-2 rounded-full hover:bg-slate-900 hover:text-white transition">DOWNLOAD PDF REPORT</button>
                    <span class="text-[10px] text-slate-400 font-bold uppercase italic">Verified by AssetPulse Intelligence Oracle</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchPool() {
            try {
                const res = await fetch('/hunted');
                const data = await res.json();
                const body = document.getElementById('assetTableBody');
                
                body.innerHTML = data.assets.map(a => `
                    <tr onclick="selectAsset('${a.name}')">
                        <td class="font-bold text-blue-600 tracking-tight">${a.name}</td>
                        <td><span class="text-[10px] font-black text-slate-400 bg-slate-100 px-2 py-1 rounded uppercase tracking-tighter">${a.type}</span></td>
                        <td><span class="status-pill status-high">${a.status}</span></td>
                        <td class="text-xs font-bold text-slate-300">ACQUIRE ASSET →</td>
                    </tr>
                `).join('');
            } catch (e) { console.error("Neural link failed."); }
        }

        function selectAsset(name) {
            document.getElementById('assetInput').value = name;
            // Visual feedback
            const input = document.getElementById('assetInput');
            input.classList.add('ring-4', 'ring-blue-100');
            setTimeout(() => input.classList.remove('ring-4', 'ring-blue-100'), 500);
        }

        async function runAudit(mode) {
            const val = document.getElementById('assetInput').value;
            if(!val) return alert("Select an asset identity from the table first.");

            const modal = document.getElementById('modal');
            const content = document.getElementById('modalContent');
            const title = document.getElementById('modalTitle');

            modal.classList.remove('hidden');
            title.innerText = mode === 'analyze' ? "Valuation Audit" : "Target Buyer Strategy";
            content.innerHTML = `<div class="flex flex-col items-center py-10 gap-4">
                <div class="loader h-10 w-10 border-4 border-slate-200 rounded-full"></div>
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest animate-pulse">Running Neural Market Scan...</p>
            </div>`;

            try {
                const res = await fetch(`/${mode}?name=${encodeURIComponent(val)}`);
                const data = await res.json();
                content.innerText = data.result || data.error;
            } catch (e) { content.innerText = "System connection failure. Neural cores offline."; }
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        
        // Initial Fetch
        fetchPool();
        // Auto-sync every 30 seconds
        setInterval(fetchPool, 30000);
    </script>
</body>
</html>
