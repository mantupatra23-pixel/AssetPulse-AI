<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AssetPulse AI | Global Strategic Node</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc;
            color: #0f172a;
            margin: 0;
            overflow-x: hidden;
        }

        .premium-card {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 1.5rem;
            transition: all 0.3s ease;
        }

        .premium-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.05); 
            border-color: #3b82f6;
        }

        .btn-action {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.3);
        }

        .ticker-bar {
            background: #0f172a;
            color: #f1f5f9;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            animation: marquee 30s linear infinite;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }

        .loader-spin {
            border: 3px solid #f1f5f9;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-32">

    <div class="ticker-bar py-3 sticky top-0 z-[100] border-b border-white/5 backdrop-blur-md">
        <div class="marquee-content">
            <span class="mx-8 text-green-400">● ASSET-2088 ACQUIRED ($99)</span>
            <span class="mx-8 text-blue-400">● NEW SIGNAL DETECTED: SINGAPORE</span>
            <span class="mx-8 text-green-400">● ASSET-2041 IDENTITY REVEALED (LONDON)</span>
            <span class="mx-8 text-yellow-400">● AUDIT GENERATED: HINDI ACTIVE</span>
        </div>
    </div>

    <div class="p-5 md:p-12 max-w-7xl mx-auto">
        <header class="mb-10">
            <div class="flex items-center gap-2 mb-2">
                <span class="h-2 w-2 rounded-full bg-blue-600 animate-pulse"></span>
                <span class="text-[9px] font-black text-blue-600 uppercase tracking-widest">Predator OS v22.3</span>
            </div>
            <h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter italic">AssetPulse <span class="text-blue-600">AI</span></h1>
            <p class="text-slate-500 font-medium mt-1">Autonomous VC-Grade Audit Engine</p>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="premium-card p-6">
                <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest">Nodes</p>
                <h4 class="text-2xl font-bold">100</h4>
            </div>
            <div class="premium-card p-6 border-b-4 border-blue-600">
                <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest">Status</p>
                <h4 class="text-2xl font-bold text-blue-600">Active</h4>
            </div>
        </div>

        <div class="sticky top-14 z-[90] mb-10">
            <input type="text" id="searchInput" onkeyup="filterAssets()" placeholder="Search nodes (.ai, .io, .com)..." 
                   class="w-full premium-card px-8 py-5 text-base font-bold outline-none focus:ring-4 ring-blue-500/10 shadow-xl border-none">
        </div>

        <div id="assetContainer" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>
    </div>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] max-w-md bg-white/90 backdrop-blur-xl p-4 flex justify-between items-center z-[110] rounded-[2rem] border border-slate-200 shadow-2xl">
        <button onclick="location.reload()" class="p-3 text-slate-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
        </button>
        <button onclick="alert('Scanning Global Nodes...')" class="btn-action px-10 py-3 rounded-2xl text-[10px] font-black uppercase tracking-widest">Deep Scan</button>
        <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="p-3 text-slate-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
        </button>
    </nav>

    <div id="reportModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xl hidden z-[200] items-center justify-center p-3 md:p-10">
        <div class="bg-white w-full max-w-4xl rounded-[2.5rem] shadow-2xl flex flex-col max-h-[92vh] overflow-hidden relative border border-white/20">
            
            <button onclick="closeReport()" class="absolute top-5 right-6 text-4xl font-light text-slate-400 hover:text-slate-900 z-[210]">&times;</button>
            
            <div class="p-6 md:p-8 border-b border-slate-100 bg-white">
                <span class="text-blue-600 font-black text-[9px] uppercase tracking-[0.4em] mb-1 block">Audit Report</span>
                <div class="flex justify-between items-center">
                    <h3 id="modalSub" class="text-2xl md:text-3xl font-black text-slate-900 italic">LOCKED</h3>
                    <div class="bg-slate-50 px-4 py-1.5 rounded-xl border border-slate-100">
                        <p id="timer" class="text-lg font-bold text-red-500">15:00</p>
                    </div>
                </div>
            </div>

            <div class="p-6 md:p-10 overflow-y-auto flex-1 no-scrollbar bg-slate-50/30">
                <div class="flex gap-2 mb-6 overflow-x-auto no-scrollbar">
                    <button onclick="changeLang('English')" class="lang-btn bg-blue-600 text-white px-5 py-2 rounded-xl text-[10px] font-black uppercase">English</button>
                    <button onclick="changeLang('Hindi')" class="lang-btn bg-slate-100 text-slate-500 px-5 py-2 rounded-xl text-[10px] font-black uppercase">Hindi</button>
                    <button onclick="changeLang('Arabic')" class="lang-btn bg-slate-100 text-slate-500 px-5 py-2 rounded-xl text-[10px] font-black uppercase">Arabic</button>
                </div>
                <div id="reportText" class="text-slate-700 leading-relaxed text-sm md:text-base italic font-medium whitespace-pre-line">
                    Initialising encrypted handshake...
                </div>
            </div>

            <div class="p-6 md:p-8 bg-white border-t border-slate-100 grid grid-cols-1 md:grid-cols-3 gap-3">
                <button onclick="downloadPDF()" class="bg-slate-900 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-lg">Download PDF</button>
                <button onclick="unlockIdentity()" class="bg-white border-2 border-slate-200 text-slate-900 py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest">Unlock Info</button>
                <button onclick="instantBuy()" class="btn-action py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest shadow-xl">Acquire ($99)</button>
            </div>
        </div>
    </div>

    <script>
        let allAssets = [];
        let currentAsset = null;
        let timerInterval;
        let currentLang = "English";

        async function loadAssets() {
            try {
                const res = await fetch('/hunted');
                const data = await res.json();
                allAssets = data.assets;
                renderCards(allAssets);
            } catch(e) { console.error("Node Offline"); }
        }

        function renderCards(assets) {
            const container = document.getElementById('assetContainer');
            container.innerHTML = assets.map(a => `
                <div class="premium-card p-8 flex flex-col gap-6">
                    <div class="flex justify-between items-start">
                        <div>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">${a.id}</p>
                            <h2 class="text-3xl font-black text-slate-900 italic tracking-tighter">${a.name}</h2>
                        </div>
                        <div class="bg-blue-50 px-3 py-1 rounded-full"><span class="text-[9px] text-blue-600 font-black uppercase">Locked</span></div>
                    </div>
                    <button onclick="openModal('${a.name}', '${a.id}')" class="btn-action py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest italic">Generate Strategy Audit</button>
                </div>
            `).join('');
        }

        function filterAssets() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allAssets.filter(a => a.name.toLowerCase().includes(val) || a.id.toLowerCase().includes(val));
            renderCards(filtered);
        }

        async function openModal(hiddenName, id) {
            currentAsset = { hiddenName, id };
            const modal = document.getElementById('reportModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
            document.getElementById('modalSub').innerText = id;
            document.getElementById('reportText').innerHTML = '<div class="flex justify-center py-20"><div class="loader-spin"></div></div>';
            
            startTimer();
            const res = await fetch(`/safe_report?name=${encodeURIComponent(hiddenName)}&lang=${currentLang}`);
            const data = await res.json();
            document.getElementById('reportText').innerText = data.result;
        }

        function startTimer() {
            let time = 900;
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                let mins = Math.floor(time / 60);
                let secs = time % 60;
                document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
                if (time <= 0) { clearInterval(timerInterval); }
                time--;
            }, 1000);
        }

        async function changeLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(b => {
                b.classList.remove('bg-blue-600', 'text-white');
                b.classList.add('bg-slate-100', 'text-slate-500');
            });
            event.target.classList.remove('bg-slate-100', 'text-slate-500');
            event.target.classList.add('bg-blue-600', 'text-white');
            openModal(currentAsset.hiddenName, currentAsset.id);
        }

        function closeReport() { 
            document.getElementById('reportModal').classList.add('hidden');
            document.getElementById('reportModal').classList.remove('flex');
            document.body.style.overflow = 'auto';
            clearInterval(timerInterval); 
        }

        async function unlockIdentity() {
            const email = prompt("ENTER EMAIL FOR DECRYPTION:");
            if(email) {
                alert("Request Sent. Check email for verification.");
                await fetch(`/unlock_identity?asset_id=${currentAsset.id}&buyer_email=${encodeURIComponent(email)}`);
            }
        }

        async function instantBuy() {
            const res = await fetch(`/create_checkout?asset_id=${currentAsset.id}`);
            const data = await res.json();
            if(data.checkout_url) window.open(data.checkout_url, '_blank');
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('p', 'mm', 'a4');
            const content = document.getElementById('reportText').innerText;
            doc.setFontSize(12);
            doc.text("ASSETPULSE AUDIT: " + currentAsset.id, 10, 15);
            const splitText = doc.splitTextToSize(content, 180);
            doc.text(splitText, 10, 25);
            doc.save(`Audit_${currentAsset.id}.pdf`);
        }

        window.onload = loadAssets;
    </script>
</body>
</html>
